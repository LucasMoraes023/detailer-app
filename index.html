<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detailer App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

.logo {
  width: 120px;
  margin: 20px auto;
}

h1 {
  color: red;
}

input, select {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  width: 95%;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  background: red;
  color: white;
  font-weight: bold;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>DETAILER LUCAS MORAES</h1>

<!-- LOGIN -->
<div id="login">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="mostrarCadastro()">Criar Conta</button>
</div>

<!-- CADASTRO -->
<div id="cadastro" class="hidden">
<input id="nome_cad" placeholder="Nome">
<input id="email_cad" placeholder="Email">
<input id="senha_cad" type="password" placeholder="Senha">

<button onclick="cadastrar()">Cadastrar</button>
<button onclick="voltarLogin()">Voltar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<p>
Excelência em cuidado automotivo: acabamento padrão concessionária, polimento e vitrificação com agendamento exclusivo.
</p>

<input id="nome" placeholder="Seu nome">

<select id="servico">
<option>Polimento</option>
<option>Vitrificação</option>
<option>Lavagem Completa</option>
</select>

<select id="horario">
<option>08:00</option>
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
</select>

<button onclick="agendar()">Agendar</button>
<button onclick="logout()">Sair</button>

</div>

</div>

<script>
// 🔥 COLOQUE SUA URL E ANON KEY AQUI
const SUPABASE_URL = "https://zmhwbnxnceibmdmntbhh.supabase.co";
const SUPABASE_KEY = "zmhwbnxnceibmdmntbhh";

// Verifica se configurou
if (SUPABASE_KEY === "zmhwbnxnceibmdmntbhh") {
  alert("⚠️ Você não colocou a ANON KEY do Supabase!");
}

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// TROCAR TELAS
function mostrarCadastro(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("cadastro").classList.remove("hidden");
}

function voltarLogin(){
  document.getElementById("cadastro").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if(!email || !senha){
    alert("Preencha todos os campos");
    return;
  }

  const { error } = await supabase.auth.signInWithPassword({
    email: email,
    password: senha
  });

  if(error){
    alert("Erro no login: " + error.message);
  } else {
    abrirApp();
  }
}

// CADASTRO
async function cadastrar(){
  const email = document.getElementById("email_cad").value;
  const senha = document.getElementById("senha_cad").value;

  if(!email || !senha){
    alert("Preencha todos os campos");
    return;
  }

  const { error } = await supabase.auth.signUp({
    email: email,
    password: senha
  });

  if(error){
    alert("Erro ao cadastrar: " + error.message);
  } else {
    alert("Conta criada com sucesso!");
    voltarLogin();
  }
}

// ABRIR APP
function abrirApp(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

// LOGOUT
function logout(){
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
}

// AGENDAR
async function agendar(){
  const nome = document.getElementById("nome").value;
  const servico = document.getElementById("servico").value;
  const horario = document.getElementById("horario").value;

  if(!nome){
    alert("Digite seu nome");
    return;
  }

  const { error } = await supabase
    .from('agendamentos')
    .insert([{ nome, servico, horario, status: "pendente" }]);

  if(error){
    alert("Erro ao agendar: " + error.message);
  } else {
    alert("Agendado com sucesso!");
  }
</script>

</body>
</html>
